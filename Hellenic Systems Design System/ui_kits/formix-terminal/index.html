<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Formix Terminal — UI Kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    html, body { margin: 0; padding: 0; background: #eef0f7; font-family: 'Figtree', sans-serif; }
    .wrap { min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 32px 20px; box-sizing: border-box; }
    .inner { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .caption { font-size: 12px; color: #6b7597; font-weight: 500; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div class="wrap">
    <div class="inner">
      <div class="caption">Formix Recipe System · terminal mockup · 800 × 600</div>
      <div id="root"></div>
      <div class="caption">Click "Sign in" → pick "Recipe orders" to step through the weighing flow.</div>
    </div>
  </div>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="Shell.jsx"></script>
  <script type="text/babel" src="LoginScreen.jsx"></script>
  <script type="text/babel" src="MainMenuScreen.jsx"></script>
  <script type="text/babel" src="ProcessRecipeScreen.jsx"></script>
  <script type="text/babel" src="MixCompleteScreen.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    setTimeout(() => root.render(<App />), 50);
  </script>
</body>
</html>
