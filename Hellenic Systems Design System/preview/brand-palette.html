<!doctype html><html><head><meta charset="utf-8"><title>Brand palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;font-family:var(--hs-font-sans);background:#fff;color:var(--hs-fg-1)}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .sw{border-radius:10px;padding:14px;height:100px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,0.08)}
  .sw .top{display:flex;justify-content:space-between;align-items:flex-start;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;opacity:.9}
  .sw .bot{font-family:var(--hs-font-mono);font-size:12px;opacity:.9}
  .sw.light{color:var(--hs-midnight)}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:#122559;color:#fff"><div class="top"><span>Midnight</span><span>60/30/10 · 30%</span></div><div class="bot">#122559 · RGB 18 37 89</div></div>
    <div class="sw" style="background:#4934ad;color:#fff"><div class="top"><span>Purple</span><span>Tech-forward</span></div><div class="bot">#4934ad · RGB 73 52 173</div></div>
    <div class="sw" style="background:#d4245c;color:#fff"><div class="top"><span>Pink</span><span>CTA · 10%</span></div><div class="bot">#d4245c · RGB 212 36 92</div></div>
  </div>
</body></html>
