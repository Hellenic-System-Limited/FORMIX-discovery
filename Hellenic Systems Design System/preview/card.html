<!doctype html><html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:var(--hs-bg-alt);font-family:var(--hs-font-sans);color:var(--hs-fg-1)}
.card{background:#fff;border:1px solid var(--hs-border);border-radius:10px;padding:20px;box-shadow:var(--hs-shadow-md);max-width:640px}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--hs-purple-600)}
.title{font-size:22px;font-weight:600;margin:6px 0 4px;letter-spacing:-0.01em}
.meta{display:flex;gap:14px;font-size:13px;color:var(--hs-fg-3);font-variant-numeric:tabular-nums}
.row{display:flex;justify-content:space-between;align-items:flex-end;margin-top:14px}
.big{font-size:32px;font-weight:600;letter-spacing:-0.01em;font-variant-numeric:tabular-nums}
.btn{background:#122559;color:#fff;border:0;border-radius:8px;padding:9px 16px;font-weight:600;font-size:14px}
</style></head>
<body>
<div class="card">
  <div class="eyebrow">Order 104523</div>
  <div class="title">Recipe SPICE-A · Caribbean jerk mix</div>
  <div class="meta"><span>Mix 2 of 4</span><span>·</span><span>Prep: Dry</span><span>·</span><span>Terminal Scale 1</span></div>
  <div class="row">
    <div><div style="font-size:12px;color:var(--hs-fg-3)">Remaining in mix</div><div class="big">12.40 <span style="font-size:16px;font-weight:400;color:var(--hs-fg-3)">kg</span></div></div>
    <button class="btn">Continue mix</button>
  </div>
</div>
</body></html>
