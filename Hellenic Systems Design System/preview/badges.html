<!doctype html><html><head><meta charset="utf-8"><title>Badges & chips</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--hs-font-sans)}
.row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;align-items:center}
.b{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;letter-spacing:.01em}
.dot{width:6px;height:6px;border-radius:50%}
.b.s{background:#e4f4ec;color:#1f8a5a}
.b.w{background:#fdf0dc;color:#b25b00}
.b.d{background:#fbdce6;color:#d4245c}
.b.i{background:#eeeafa;color:#4934ad}
.b.n{background:#eef0f7;color:#3a4468}
.b.dk{background:#122559;color:#fff}
.lbl{font-family:var(--hs-font-mono);font-size:10px;color:var(--hs-fg-3);width:60px}
</style></head>
<body>
<div class="row"><span class="lbl">status</span>
  <span class="b s"><span class="dot" style="background:#1f8a5a"></span>complete</span>
  <span class="b i"><span class="dot" style="background:#4934ad"></span>in progress</span>
  <span class="b w"><span class="dot" style="background:#b25b00"></span>on hold</span>
  <span class="b d"><span class="dot" style="background:#d4245c"></span>out of tolerance</span>
  <span class="b n"><span class="dot" style="background:#6b7597"></span>queued</span>
</div>
<div class="row"><span class="lbl">tag</span>
  <span class="b dk">Allergen: gluten</span>
  <span class="b dk">Allergen: soy</span>
  <span class="b n">Prep · Dry</span>
  <span class="b n">Prep · Wet</span>
</div>
</body></html>
