<!doctype html><html><head><meta charset="utf-8"><title>Gradient</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;font-family:var(--hs-font-sans);background:#fff;color:var(--hs-fg-1)}
.bar{height:90px;border-radius:12px;background:linear-gradient(100deg,#122559 0%,#122559 35%,#4934ad 55%,#4934ad 75%,#d4245c 100%);display:flex;align-items:flex-end;padding:12px;color:#fff;font-size:12px;font-weight:600;letter-spacing:.04em}
.labels{display:grid;grid-template-columns:45fr 35fr 20fr;margin-top:10px;font-size:12px}
.labels div{display:flex;align-items:center;gap:6px}
.dot{width:10px;height:10px;border-radius:50%}
</style></head>
<body>
<div class="bar">Hellenic gradient · design feature only</div>
<div class="labels">
  <div><span class="dot" style="background:#122559"></span>Midnight — 45%</div>
  <div><span class="dot" style="background:#4934ad"></span>Purple — 35%</div>
  <div><span class="dot" style="background:#d4245c"></span>Pink — 20%</div>
</div>
</body></html>
