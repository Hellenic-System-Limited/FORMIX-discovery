<!doctype html><html><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:18px;background:#fff;font-family:var(--hs-font-sans)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.box{padding:18px;border-radius:10px;border:1px solid var(--hs-border);display:flex;align-items:center;justify-content:center;min-height:110px}
.box.dark{background:var(--hs-midnight);border-color:var(--hs-midnight)}
.cap{font-family:var(--hs-font-mono);font-size:11px;color:var(--hs-fg-3);margin-top:6px;text-align:center}
img{width:220px;height:auto}
</style></head>
<body>
<div class="row">
  <div>
    <div class="box"><img src="../assets/hellenic-logo.png" alt="Hellenic Systems"></div>
    <div class="cap">Primary — full colour on white</div>
  </div>
  <div>
    <div class="box dark"><img src="../assets/hellenic-logo-white.png" alt="Hellenic Systems white"></div>
    <div class="cap">Secondary — white on dark/coloured</div>
  </div>
</div>
</body></html>
