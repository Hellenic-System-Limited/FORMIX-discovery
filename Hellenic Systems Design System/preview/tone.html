<!doctype html><html><head><meta charset="utf-8"><title>Tone of voice</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--hs-font-sans);color:var(--hs-fg-1)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.col{border:1px solid var(--hs-border);border-radius:10px;padding:14px}
.col h4{margin:0 0 10px;font-size:13px;font-weight:600;letter-spacing:.02em}
.ok{color:#1f8a5a}.no{color:#d4245c}
.col p{margin:0 0 8px;font-size:14px;line-height:1.5}
.col .q{font-family:var(--hs-font-mono);font-size:10px;color:var(--hs-fg-3);margin-bottom:2px;letter-spacing:.04em;text-transform:uppercase}
</style></head>
<body>
<div class="grid">
  <div class="col"><h4 class="ok">Do — plain, personal, confident</h4>
    <div class="q">CTA</div><p>"Start your next order."</p>
    <div class="q">Empty state</div><p>"No orders yet. When your planner schedules one, you'll see it here."</p>
  </div>
  <div class="col"><h4 class="no">Don't — jargon, third-person, emoji</h4>
    <div class="q">CTA</div><p>"Initiate order workflow 🚀"</p>
    <div class="q">Empty state</div><p>"The system currently has no orders assigned to this user."</p>
  </div>
</div>
</body></html>
