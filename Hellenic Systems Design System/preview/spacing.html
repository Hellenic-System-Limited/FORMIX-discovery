<!doctype html><html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--hs-font-sans);color:var(--hs-fg-1)}
.row{display:flex;align-items:flex-end;gap:14px}
.cell{display:flex;flex-direction:column;align-items:flex-start;gap:6px}
.bar{background:var(--hs-purple-600);border-radius:4px;width:28px}
.n{font-size:11px;font-family:var(--hs-font-mono);color:var(--hs-fg-2)}
</style></head>
<body>
<div class="row">
  <div class="cell"><div class="bar" style="height:4px"></div><div class="n">1 · 4px</div></div>
  <div class="cell"><div class="bar" style="height:8px"></div><div class="n">2 · 8</div></div>
  <div class="cell"><div class="bar" style="height:12px"></div><div class="n">3 · 12</div></div>
  <div class="cell"><div class="bar" style="height:16px"></div><div class="n">4 · 16</div></div>
  <div class="cell"><div class="bar" style="height:24px"></div><div class="n">6 · 24</div></div>
  <div class="cell"><div class="bar" style="height:32px"></div><div class="n">8 · 32</div></div>
  <div class="cell"><div class="bar" style="height:48px"></div><div class="n">12 · 48</div></div>
  <div class="cell"><div class="bar" style="height:64px"></div><div class="n">16 · 64</div></div>
  <div class="cell"><div class="bar" style="height:80px"></div><div class="n">20 · 80</div></div>
</div>
</body></html>
