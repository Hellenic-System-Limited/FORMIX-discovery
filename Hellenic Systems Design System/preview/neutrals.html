<!doctype html><html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;font-family:var(--hs-font-sans);background:#fff}
.row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.sw{border-radius:8px;padding:10px;height:92px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--hs-border)}
.n{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.h{font-family:var(--hs-font-mono);font-size:10.5px;opacity:.8}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:#0a1022;color:#fff"><div class="n">ink</div><div class="h">#0a1022</div></div>
  <div class="sw" style="background:#122559;color:#fff"><div class="n">fg-1</div><div class="h">#122559</div></div>
  <div class="sw" style="background:#3a4468;color:#fff"><div class="n">fg-2</div><div class="h">#3a4468</div></div>
  <div class="sw" style="background:#6b7597;color:#fff"><div class="n">fg-3</div><div class="h">#6b7597</div></div>
  <div class="sw" style="background:#9aa3c0;color:#fff"><div class="n">muted</div><div class="h">#9aa3c0</div></div>
  <div class="sw" style="background:#c3c9db;color:#122559"><div class="n">border-strong</div><div class="h">#c3c9db</div></div>
  <div class="sw" style="background:#dde1ec;color:#122559"><div class="n">border</div><div class="h">#dde1ec</div></div>
  <div class="sw" style="background:#eef0f7;color:#122559"><div class="n">bg-sunken</div><div class="h">#eef0f7</div></div>
  <div class="sw" style="background:#f6f7fb;color:#122559"><div class="n">bg-alt</div><div class="h">#f6f7fb</div></div>
  <div class="sw" style="background:#ffffff;color:#122559"><div class="n">bg</div><div class="h">#ffffff</div></div>
  <div class="sw" style="background:#e4e8f2;color:#122559"><div class="n">midnight-100</div><div class="h">#e4e8f2</div></div>
  <div class="sw" style="background:#f3f5fa;color:#122559"><div class="n">midnight-50</div><div class="h">#f3f5fa</div></div>
</div>
</body></html>
