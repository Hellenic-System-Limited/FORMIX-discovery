<!doctype html><html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:18px;background:#fff;font-family:var(--hs-font-sans);color:var(--hs-fg-1)}
.row{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-bottom:10px}
.ic{border:1px solid var(--hs-border);border-radius:8px;height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:10px;color:var(--hs-fg-3)}
svg{width:22px;height:22px;stroke:var(--hs-midnight);stroke-width:1.75;fill:none;stroke-linecap:round;stroke-linejoin:round}
.lbl{font-family:var(--hs-font-mono);font-size:11px;color:var(--hs-fg-3);margin-bottom:4px}
</style></head>
<body>
<div class="lbl">Lucide · 22px · 1.75 stroke · currentColor</div>
<div class="row">
  <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3v9l6 3"/></svg>scale</div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M21 8V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2h14a2 2 0 002-2v-2"/><path d="M16 12h5M19 9l3 3-3 3"/></svg>login</div>
  <div class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M8 14h5"/></svg>order</div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/></svg>report</div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M12 2l9 4v6c0 5-4 9-9 10-5-1-9-5-9-10V6l9-4z"/><path d="M9 12l2 2 4-4"/></svg>qa</div>
  <div class="ic"><svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12" rx="1"/><path d="M7 6v12M10 6v12M13 6v12M16 6v12"/></svg>barcode</div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>next</div>
  <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>alert</div>
</div>
</body></html>
