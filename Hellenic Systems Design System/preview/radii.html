<!doctype html><html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--hs-font-sans)}
.row{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.card{background:var(--hs-bg-sunken);height:84px;display:flex;align-items:center;justify-content:center;font-family:var(--hs-font-mono);font-size:11px;color:var(--hs-fg-2);border:1px solid var(--hs-border)}
</style></head>
<body>
<div class="row">
  <div class="card" style="border-radius:4px">xs · 4</div>
  <div class="card" style="border-radius:6px">sm · 6</div>
  <div class="card" style="border-radius:10px">md · 10</div>
  <div class="card" style="border-radius:14px">lg · 14</div>
  <div class="card" style="border-radius:20px">xl · 20</div>
  <div class="card" style="border-radius:999px">pill</div>
</div>
</body></html>
